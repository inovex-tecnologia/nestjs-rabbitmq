version: 2
updates:
    # Atualiza SHAs das GitHub Actions — só patch/minor (sem major).
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
      commit-message:
          prefix: ci

    # Alertas de seguranca das deps npm — so patch/minor (sem major).
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
      open-pull-requests-limit: 3
      commit-message:
          prefix: deps
